version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: baraka_db
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=baraka
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=barakasecurepass
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    container_name: baraka_redis
    ports:
      - "6379:6379"

  backend:
    build: .
    container_name: baraka_backend
    command: >
      sh -c "python manage.py migrate &&
             gunicorn backend.wsgi:application --bind 0.0.0.0:8000 --workers 4 --threads 2 --timeout 120"
    ports:
      - "8000:8000"
    environment:
      - DB_HOST=db
      - DB_NAME=baraka
      - DB_USER=postgres
      - DB_PASSWORD=barakasecurepass
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  celery_worker:
    build: .
    container_name: baraka_celery_worker
    command: celery -A backend worker --loglevel=info
    environment:
      - DB_HOST=db
      - DB_NAME=baraka
      - DB_USER=postgres
      - DB_PASSWORD=barakasecurepass
      - REDIS_URL=redis://redis:6379/1
      - CELERY_BROKER_URL=redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    container_name: baraka_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  postgres_data:
