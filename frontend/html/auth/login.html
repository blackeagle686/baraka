<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card animate-up">
            <div class="text-center mb-4 position-relative">
                <div class="auth-illustration mb-2 animate-up delay-1">
                    <span style="font-size: 3rem; text-shadow: 0 10px 20px rgba(194, 146, 64, 0.2);">✨</span>
                </div>
                <a href="/html/index.html" class="text-decoration-none">
                    <div class="auth-logo animate-up delay-2">بركة</div>
                </a>
                <p class="auth-subtitle animate-up delay-3">سجل دخولك للمتابعة</p>
            </div>
            <form id="loginForm" class="animate-up delay-4">
                <div class="mb-3">
                    <label class="form-label text-espresso fw-bold"><i class="bi bi-phone me-1"></i>رقم الهاتف</label>
                    <input type="text" class="form-control rounded-pill px-4 py-3 fs-5 text-center" id="phone" placeholder="01xxxxxxxxx" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-espresso fw-bold"><i class="bi bi-lock me-1"></i>كلمة المرور</label>
                    <div class="position-relative">
                        <input type="password" class="form-control rounded-pill px-4 py-3 fs-5 text-center" id="password" placeholder="••••••••" required>
                        <button type="button" class="btn btn-link position-absolute top-50 start-0 translate-middle-y text-mesa text-decoration-none password-toggle" onclick="togglePassword('password', this)" style="padding-left: 1rem;">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>
                <button type="submit" id="loginBtn" class="btn btn-primary rounded-pill w-100 py-3 fw-bold mb-3 fs-5 position-relative overflow-hidden">
                    <span class="btn-text"><i class="bi bi-box-arrow-in-left me-1"></i>دخول</span>
                    <span class="spinner-border spinner-border-sm position-absolute top-50 start-50 translate-middle d-none" role="status" aria-hidden="true"></span>
                </button>
                <div id="errorMsg" class="alert alert-danger text-center py-2 rounded-pill d-none small">
                    <i class="bi bi-exclamation-triangle me-1"></i>بيانات الدخول غير صحيحة
                </div>
                <div class="text-center auth-footer-link mt-3">
                    <span class="text-mesa">ليس لديك حساب؟</span>
                    <a href="/html/auth/register.html">حساب جديد</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
