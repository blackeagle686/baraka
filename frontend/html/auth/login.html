<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card animate-up">
            <div class="text-center mb-4">
                <a href="/html/index.html" class="text-decoration-none">
                    <div class="auth-logo">بركة</div>
                </a>
                <p class="auth-subtitle">سجل دخولك للمتابعة</p>
            </div>
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label text-espresso fw-bold"><i class="bi bi-phone me-1"></i>رقم الهاتف</label>
                    <input type="text" class="form-control rounded-pill px-4 py-2" id="phone" placeholder="01xxxxxxxxx" required>
                </div>
                <div class="mb-4">
                    <label class="form-label text-espresso fw-bold"><i class="bi bi-lock me-1"></i>كلمة المرور</label>
                    <input type="password" class="form-control rounded-pill px-4 py-2" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 fw-bold mb-3">
                    <i class="bi bi-box-arrow-in-left me-1"></i>دخول
                </button>
                <div id="errorMsg" class="alert alert-danger text-center py-2 rounded-pill d-none small">
                    <i class="bi bi-exclamation-triangle me-1"></i>بيانات الدخول غير صحيحة
                </div>
                <div class="text-center auth-footer-link mt-3">
                    <span class="text-mesa">ليس لديك حساب؟</span>
                    <a href="/html/auth/register.html">حساب جديد</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
