<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب جديد - بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body>
    <div class="auth-wrapper">
        <div class="auth-card auth-card-wide animate-up">
            <div class="text-center mb-4">
                <a href="/html/index.html" class="text-decoration-none">
                    <div class="auth-logo">بركة</div>
                </a>
                <p class="auth-subtitle">انضم إلينا واطلب اللي تحتاجه</p>
            </div>
            <form id="registerForm">
                <div class="row">
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-espresso fw-bold"><i class="bi bi-person me-1"></i>الاسم</label>
                        <input type="text" class="form-control rounded-pill px-4 py-2" id="name" placeholder="الاسم بالكامل" required>
                    </div>
                    <div class="col-md-6 mb-3">
                        <label class="form-label text-espresso fw-bold"><i class="bi bi-phone me-1"></i>رقم الهاتف</label>
                        <input type="text" class="form-control rounded-pill px-4 py-2" id="phone" placeholder="01xxxxxxxxx" required>
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label text-espresso fw-bold"><i class="bi bi-geo-alt me-1"></i>العنوان (المكان)</label>
                    <input type="text" class="form-control rounded-pill px-4 py-2" id="location" placeholder="مثال: الشارع الرئيسي، قريتك">
                </div>
                <div class="mb-3">
                    <label class="form-label text-espresso fw-bold"><i class="bi bi-person-badge me-1"></i>نوع الحساب</label>
                    <select class="form-select rounded-pill px-4 py-2" id="role">
                        <option value="CUSTOMER">مشتري</option>
                        <option value="SHOP_OWNER">صاحب محل</option>
                        <option value="DRIVER">طيار (مندوب توصيل)</option>
                    </select>
                </div>
                <div class="mb-4">
                    <label class="form-label text-espresso fw-bold"><i class="bi bi-lock me-1"></i>كلمة المرور</label>
                    <input type="password" class="form-control rounded-pill px-4 py-2" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 fw-bold mb-3">
                    <i class="bi bi-person-plus me-1"></i>إنشاء حساب
                </button>
                <div id="errorMsg" class="alert alert-danger text-center py-2 rounded-pill d-none small">
                    <i class="bi bi-exclamation-triangle me-1"></i>حدث خطأ أثناء التسجيل.
                </div>
                <div class="text-center auth-footer-link mt-3">
                    <span class="text-mesa">لديك حساب بالفعل؟</span>
                    <a href="/html/auth/login.html">تسجيل الدخول</a>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
