<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حساب جديد - بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/auth.css">
</head>
<body class="bg-dune">
    <div class="container d-flex align-items-center justify-content-center min-vh-100 py-5">
        <div class="col-md-6">
            <div class="card shop-card border-0 p-4 animate-up">
                <div class="text-center mb-4">
                    <a href="/html/index.html" class="text-decoration-none">
                        <h2 class="fw-bold text-espresso">بركة</h2>
                    </a>
                    <p class="text-mesa">انضم إلينا واطلب اللي تحتاجه</p>
                </div>
                <form id="registerForm">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-espresso fw-bold">الاسم</label>
                            <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="name" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label text-espresso fw-bold">رقم الهاتف</label>
                            <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="phone" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-espresso fw-bold">العنوان (المكان)</label>
                        <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="location">
                    </div>
                    <div class="mb-3">
                        <label class="form-label text-espresso fw-bold">نوع الحساب</label>
                        <select class="form-select rounded-pill bg-light border-0 px-4 py-2" id="role">
                            <option value="CUSTOMER">مشتري</option>
                            <option value="SHOP_OWNER">صاحب محل</option>
                            <option value="DRIVER">طيار (مندوب توصيل)</option>
                        </select>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-espresso fw-bold">كلمة المرور</label>
                        <input type="password" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 fw-bold mb-3">إنشاء حساب</button>
                    <div id="errorMsg" class="text-danger text-center mb-2 d-none">حدث خطأ أثناء التسجيل.</div>
                    <div class="text-center">
                        <span class="text-mesa">لديك حساب بالفعل؟</span>
                        <a href="/html/auth/login.html" class="text-marigold text-decoration-none fw-bold">تسجيل الدخول</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="/js/api.js"></script>
    <script src="/js/auth.js"></script>
</body>
</html>
