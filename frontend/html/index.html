<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة بركة - Baraka SaaS</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="../css/main_style.css">
    <link rel="stylesheet" href="../css/index.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-espresso fs-3" href="index.html">بركة</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="shops/list.html">المحلات</a>
                    </li>
                </ul>
                <div class="d-flex auth-buttons" id="authSection">
                    <!-- Auth buttons will be populated by JS -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section d-flex align-items-center">
        <div class="container text-center">
            <h1 class="display-3 fw-bold text-espresso mb-4 animate-up">اطلب كل اللي تحتاجه، <br><span class="text-marigold">في أي وقت!</span></h1>
            <p class="lead text-mesa mb-5 animate-up delay-1">أسرع خدمة توصيل في قريتك. من المحل لباب بيتك.</p>
            <a href="shops/list.html" class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-bold animate-up delay-2 shadow-sm pulse-btn">تصفح المحلات</a>
        </div>
    </section>

    <!-- Shops Section (Preview) -->
    <section class="py-5 bg-dune" id="shopsPreview">
        <div class="container">
            <h2 class="text-center fw-bold text-espresso mb-5">أشهر المحلات</h2>
            <div class="row" id="shopsList">
                <!-- Shop cards will be populated by JS -->
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="../js/api.js"></script>
    <script src="../js/main.js"></script>
    <script src="../js/index.js"></script>
</body>
</html>
