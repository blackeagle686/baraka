<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="منصة بركة - أسرع خدمة توصيل في قريتك. اطلب كل اللي تحتاجه من المحل لباب بيتك.">
    <title>منصة بركة - توصيل طلبات</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/index.css">
</head>
<body>
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Hero Section -->
    <section class="hero-section">
        <div class="container text-center">
            <h1 class="text-espresso mb-3 animate-up">اطلب كل اللي تحتاجه، <br><span class="text-marigold">في أي وقت!</span></h1>
            <p class="lead text-mesa mb-5 animate-up delay-1">أسرع خدمة توصيل في قريتك. من المحل لباب بيتك.</p>
            <a href="/html/shops/list.html" class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-bold animate-up delay-2 pulse-btn">
                <i class="bi bi-shop-window me-2"></i>تصفح المحلات
            </a>
        </div>
    </section>

    <!-- How It Works -->
    <section class="how-it-works py-5">
        <div class="container py-4">
            <h2 class="text-center fw-bold text-espresso mb-5 animate-up">
                <span class="section-title">ازاي الموضوع بيمشي؟</span>
            </h2>
            <div class="row g-4 justify-content-center">
                <div class="col-md-4 animate-up delay-1">
                    <div class="step-card h-100">
                        <div class="step-icon"><i class="bi bi-search"></i></div>
                        <h5 class="fw-bold text-espresso mb-2">تصفح المحلات</h5>
                        <p class="text-mesa mb-0 small">اختار المحل اللي عايزه من القائمة</p>
                    </div>
                </div>
                <div class="col-md-4 animate-up delay-2">
                    <div class="step-card h-100">
                        <div class="step-icon"><i class="bi bi-cart-check"></i></div>
                        <h5 class="fw-bold text-espresso mb-2">اطلب المنتجات</h5>
                        <p class="text-mesa mb-0 small">ضيف المنتجات في السلة وابعت طلبك</p>
                    </div>
                </div>
                <div class="col-md-4 animate-up delay-3">
                    <div class="step-card h-100">
                        <div class="step-icon"><i class="bi bi-truck"></i></div>
                        <h5 class="fw-bold text-espresso mb-2">التوصيل لحد عندك</h5>
                        <p class="text-mesa mb-0 small">المندوب هيوصلك طلبك لحد باب البيت</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Featured Shops -->
    <section class="py-5" id="shopsPreview">
        <div class="container py-3">
            <h2 class="text-center fw-bold text-espresso mb-5 animate-up">
                <span class="section-title">أشهر المحلات</span>
            </h2>
            <div class="row g-4" id="shopsList">
                <!-- Shop cards will be populated by JS -->
            </div>
        </div>
    </section>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/index.js"></script>
</body>
</html>
