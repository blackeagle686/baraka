<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة محلي - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body class="bg-dune">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-espresso fs-3" href="/html/index.html">بركة</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/html/index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="/html/shops/list.html">المحلات</a></li>
                </ul>
                <div class="d-flex auth-buttons" id="authSection"></div>
            </div>
        </div>
    </nav>

    <!-- Dashboard Section -->
    <section class="py-5 mt-5">
        <div class="container mt-4">
            <div class="row justify-content-center">
                <!-- Shop Details -->
                <div class="col-md-10 mb-4">
                    <div class="card shop-card border-0 p-4 animate-up">
                        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom border-terracotta pb-3">
                            <h3 class="fw-bold text-espresso m-0" id="shopTitle">إعدادات المحل</h3>
                            <span class="badge bg-danger rounded-pill px-3 py-2 d-none" id="shopStatusBadge">مغلق</span>
                        </div>
                        
                        <form id="shopForm" enctype="multipart/form-data">
                            <div class="text-center mb-4">
                                <div class="d-inline-block position-relative">
                                    <div id="shopImagePreview" class="rounded d-flex align-items-center justify-content-center shadow" style="width: 200px; height: 120px; overflow: hidden; background: linear-gradient(45deg, var(--color-terracotta), var(--color-mesa));">
                                        <span class="text-white fs-4" id="shopInitials">صورة المحل</span>
                                    </div>
                                    <label for="shopImage" class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 start-0 translate-middle-y ms-2 shadow" style="width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-camera-fill" viewBox="0 0 16 16">
                                          <path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
                                          <path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1m9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0"/>
                                        </svg>
                                    </label>
                                    <input type="file" id="shopImage" accept="image/*" class="d-none">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-espresso fw-bold">اسم المحل</label>
                                    <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="shopName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-espresso fw-bold">العنوان</label>
                                    <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="shopAddress" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-espresso fw-bold">وصف المحل</label>
                                <textarea class="form-control rounded-4 bg-light border-0 px-4 py-2" id="shopDesc" rows="3"></textarea>
                            </div>
                            <div class="form-check form-switch mb-4">
                                <input class="form-check-input" type="checkbox" role="switch" id="shopIsOpen" checked>
                                <label class="form-check-label text-espresso fw-bold ms-2" for="shopIsOpen">المحل مفتوح لاستقبال الطلبات</label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 fw-bold mb-3" id="saveShopBtn">حفظ بيانات المحل</button>
                            <div id="shopStatusMsg" class="text-center fw-bold d-none"></div>
                        </form>
                    </div>
                </div>

                <!-- Products Management -->
                <div class="col-md-10" id="productsSection" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="fw-bold text-espresso m-0">منتجات المحل</h3>
                        <button class="btn btn-marigold text-white rounded-pill fw-bold shadow-sm" data-bs-toggle="modal" data-bs-target="#addProductModal">إضافة منتج +</button>
                    </div>
                    
                    <div class="row" id="shopProductsList">
                        <!-- Products will be listed here -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Add Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4" style="background-color: var(--color-dune);">
                <div class="modal-header border-terracotta">
                    <h5 class="modal-title fw-bold text-espresso" id="addProductModalLabel">إضافة منتج جديد</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="productForm">
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">اسم المنتج</label>
                            <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="prodName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">السعر (ج.م)</label>
                            <input type="number" step="0.01" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="prodPrice" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">الوصف</label>
                            <textarea class="form-control rounded-4 bg-light border-0 px-4 py-2" id="prodDesc" rows="2"></textarea>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-espresso fw-bold">صورة المنتج</label>
                            <input type="file" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="prodImage" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold" id="saveProdBtn">حفظ المنتج</button>
                    </form>
                </div>
            </div>
        </div>
    <!-- Edit Product Modal -->
    <div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="editProductModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4" style="background-color: var(--color-dune);">
                <div class="modal-header border-terracotta">
                    <h5 class="modal-title fw-bold text-espresso" id="editProductModalLabel">تعديل المنتج</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editProductForm">
                        <input type="hidden" id="editProdId">
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">اسم المنتج</label>
                            <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="editProdName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">السعر (ج.م)</label>
                            <input type="number" step="0.01" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="editProdPrice" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">الوصف</label>
                            <textarea class="form-control rounded-4 bg-light border-0 px-4 py-2" id="editProdDesc" rows="2"></textarea>
                        </div>
                        <div class="mb-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="editProdAvailable" checked>
                            <label class="form-check-label text-espresso fw-bold ms-2" for="editProdAvailable">المنتج متوفر للبيع</label>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-espresso fw-bold">تغيير صورة المنتج</label>
                            <input type="file" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="editProdImage" accept="image/*">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1 rounded-pill py-2 fw-bold" id="saveEditProdBtn">حفظ التغييرات</button>
                            <button type="button" class="btn btn-danger rounded-pill px-4 py-2 fw-bold" id="deleteProdBtn">حذف</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/shop_profile.js"></script>
</body>
</html>
