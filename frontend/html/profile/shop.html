<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة محلي - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body class="bg-dune">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/html/index.html">بركة</a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="/html/index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="/html/shops/list.html">المحلات</a></li>
                </ul>
                <div class="d-flex auth-buttons gap-2" id="authSection"></div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <section class="profile-header">
        <div class="container">
            <div class="text-center animate-up">
                <h3 class="fw-bold text-espresso"><i class="bi bi-shop-window me-2"></i>لوحة تحكم المحل</h3>
            </div>
        </div>
    </section>

    <!-- Dashboard -->
    <section class="py-4">
        <div class="container">
            <div class="row justify-content-center">
                <!-- Shop Settings Card -->
                <div class="col-lg-10 mb-4">
                    <div class="dashboard-card animate-up">
                        <div class="dashboard-section-title d-flex justify-content-between align-items-center">
                            <span id="shopTitle"><i class="bi bi-gear me-2"></i>إعدادات المحل</span>
                            <span class="badge status-closed rounded-pill px-3 py-2 d-none" id="shopStatusBadge">
                                <i class="bi bi-pause-circle me-1"></i>مغلق
                            </span>
                        </div>
                        
                        <form id="shopForm" enctype="multipart/form-data">
                            <!-- Shop Image -->
                            <div class="text-center mb-4">
                                <div class="d-inline-block position-relative">
                                    <div id="shopImagePreview" class="shop-image-preview d-flex align-items-center justify-content-center">
                                        <span class="text-white fs-4" id="shopInitials">صورة المحل</span>
                                    </div>
                                    <label for="shopImage" class="upload-btn position-absolute bottom-0 start-0 translate-middle-y ms-2">
                                        <i class="bi bi-camera-fill" style="font-size: 0.85rem;"></i>
                                    </label>
                                    <input type="file" id="shopImage" accept="image/*" class="d-none">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-espresso fw-bold"><i class="bi bi-shop me-1"></i>اسم المحل</label>
                                    <input type="text" class="form-control rounded-pill px-4 py-2" id="shopName" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-espresso fw-bold"><i class="bi bi-geo-alt me-1"></i>العنوان</label>
                                    <input type="text" class="form-control rounded-pill px-4 py-2" id="shopAddress" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-espresso fw-bold"><i class="bi bi-text-paragraph me-1"></i>وصف المحل</label>
                                <textarea class="form-control rounded-4 px-4 py-2" id="shopDesc" rows="3"></textarea>
                            </div>
                            <div class="form-check form-switch mb-4">
                                <input class="form-check-input" type="checkbox" role="switch" id="shopIsOpen" checked>
                                <label class="form-check-label text-espresso fw-bold ms-2" for="shopIsOpen">
                                    <i class="bi bi-door-open me-1"></i>المحل مفتوح لاستقبال الطلبات
                                </label>
                            </div>
                            
                            <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 fw-bold mb-3" id="saveShopBtn">
                                <i class="bi bi-check2-circle me-1"></i>حفظ بيانات المحل
                            </button>
                            <div id="shopStatusMsg" class="text-center fw-bold d-none"></div>
                        </form>
                    </div>
                </div>

                <!-- Products Management -->
                <div class="col-lg-10" id="productsSection" style="display: none;">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h4 class="fw-bold text-espresso m-0"><i class="bi bi-box-seam me-2"></i>منتجات المحل</h4>
                        <button class="btn btn-marigold rounded-pill fw-bold shadow-sm px-4" data-bs-toggle="modal" data-bs-target="#addProductModal">
                            <i class="bi bi-plus-lg me-1"></i>إضافة منتج
                        </button>
                    </div>
                    
                    <div class="row g-3" id="shopProductsList">
                        <!-- Products will be listed here -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Add Product Modal -->
    <div class="modal fade" id="addProductModal" tabindex="-1" aria-labelledby="addProductModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4" style="background-color: var(--color-dune-light);">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-espresso" id="addProductModalLabel">
                        <i class="bi bi-plus-circle me-2"></i>إضافة منتج جديد
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="productForm">
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">اسم المنتج</label>
                            <input type="text" class="form-control rounded-pill px-4 py-2" id="prodName" placeholder="مثال: أرز بسمتي" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">السعر (ج.م)</label>
                            <input type="number" step="0.01" class="form-control rounded-pill px-4 py-2" id="prodPrice" placeholder="0.00" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">الوصف</label>
                            <textarea class="form-control rounded-4 px-4 py-2" id="prodDesc" rows="2" placeholder="وصف مختصر للمنتج..."></textarea>
                        </div>
                        <div class="mb-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="prodAvailable" checked>
                            <label class="form-check-label text-espresso fw-bold ms-2" for="prodAvailable">المنتج متوفر للبيع</label>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-espresso fw-bold">صورة المنتج</label>
                            <input type="file" class="form-control rounded-pill px-4 py-2" id="prodImage" accept="image/*">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 rounded-pill py-2 fw-bold" id="saveProdBtn">
                            <i class="bi bi-check2 me-1"></i>حفظ المنتج
                        </button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Edit Product Modal -->
    <div class="modal fade" id="editProductModal" tabindex="-1" aria-labelledby="editProductModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4" style="background-color: var(--color-dune-light);">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-espresso" id="editProductModalLabel">
                        <i class="bi bi-pencil-square me-2"></i>تعديل المنتج
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editProductForm">
                        <input type="hidden" id="editProdId">
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">اسم المنتج</label>
                            <input type="text" class="form-control rounded-pill px-4 py-2" id="editProdName" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">السعر (ج.م)</label>
                            <input type="number" step="0.01" class="form-control rounded-pill px-4 py-2" id="editProdPrice" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label text-espresso fw-bold">الوصف</label>
                            <textarea class="form-control rounded-4 px-4 py-2" id="editProdDesc" rows="2"></textarea>
                        </div>
                        <div class="mb-3 form-check form-switch">
                            <input class="form-check-input" type="checkbox" role="switch" id="editProdAvailable" checked>
                            <label class="form-check-label text-espresso fw-bold ms-2" for="editProdAvailable">المنتج متوفر للبيع</label>
                        </div>
                        <div class="mb-4">
                            <label class="form-label text-espresso fw-bold">تغيير صورة المنتج</label>
                            <input type="file" class="form-control rounded-pill px-4 py-2" id="editProdImage" accept="image/*">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1 rounded-pill py-2 fw-bold" id="saveEditProdBtn">
                                <i class="bi bi-check2 me-1"></i>حفظ التغييرات
                            </button>
                            <button type="button" class="btn btn-danger rounded-pill px-4 py-2 fw-bold" id="deleteProdBtn">
                                <i class="bi bi-trash3 me-1"></i>حذف
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer class="app-footer mt-5">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6 text-center text-md-start mb-3 mb-md-0">
                    <span class="footer-brand">بركة</span>
                </div>
                <div class="col-md-6 text-center text-md-end">
                    <p class="mb-0 small">© 2026 بركة. جميع الحقوق محفوظة.</p>
                </div>
            </div>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/shop_profile.js"></script>
</body>
</html>
