<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>الملف الشخصي - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/profile.css">
    <style>
        .profile-header-banner {
            background: linear-gradient(135deg, var(--color-espresso) 0%, var(--color-mesa) 100%);
            padding: 6.5rem 0 3rem;
            color: white;
            border-bottom: 1px solid rgba(201, 153, 151, 0.15);
            text-align: center;
        }
        .profile-card-container {
            margin-top: -2.5rem;
            position: relative;
            z-index: 10;
        }
        .profile-main-card {
            background: white;
            border: 1px solid rgba(201, 153, 151, 0.12);
            border-radius: 24px;
            padding: 2.5rem;
            box-shadow: var(--shadow-lg);
        }
    </style>
</head>
<body class="bg-dune">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Profile Cover Banner -->
    <section class="profile-header-banner">
        <div class="container animate-up">
            <h1 class="fw-bold mb-2">👤 ملفك الشخصي</h1>
            <p class="mb-0 opacity-75 fs-5">تعديل بيانات حسابك ومعلومات التوصيل لخدمة دليفري أسرع</p>
        </div>
    </section>

    <!-- Main Form Container -->
    <section class="profile-card-container pb-5">
        <div class="container">
            <div class="row justify-content-center">
                <div class="col-lg-7 col-md-9 col-sm-12">
                    <div class="profile-main-card animate-up">
                        <form id="profileForm" enctype="multipart/form-data">
                            <!-- User Avatar Section -->
                            <div class="text-center mb-4">
                                <div class="d-inline-block position-relative">
                                    <div id="profileImagePreview" class="profile-avatar mx-auto" style="width: 130px; height: 130px; border-radius: 50%; overflow: hidden; background: var(--color-espresso); display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-md);">
                                        <span class="text-white fs-1 fw-bold" id="profileInitials">?</span>
                                    </div>
                                    <label for="image" class="upload-btn position-absolute bottom-0 start-0" style="background: var(--color-marigold); color: white; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 3px solid white; cursor: pointer; box-shadow: var(--shadow-sm); transition: var(--transition-base);">
                                        <i class="bi bi-camera-fill" style="font-size: 0.95rem;"></i>
                                    </label>
                                    <input type="file" id="image" accept="image/*" class="d-none">
                                </div>
                                <div class="mt-2 text-mesa small fw-bold">اضغط على الكاميرا لتغيير صورتك الشخصية</div>
                            </div>

                            <!-- Full Name Input -->
                            <div class="mb-4">
                                <label class="form-label text-espresso fw-bold" style="font-size: 1.05rem;">
                                    <i class="bi bi-person-fill text-marigold me-1"></i>الاسم بالكامل
                                </label>
                                <input type="text" class="form-control rounded-pill px-4 py-3" id="name" required style="font-size: 1.1rem; border: 1.5px solid rgba(201,153,151,0.2);">
                            </div>

                            <!-- Phone Number Input -->
                            <div class="mb-4">
                                <label class="form-label text-espresso fw-bold" style="font-size: 1.05rem;">
                                    <i class="bi bi-telephone-fill text-marigold me-1"></i>رقم الهاتف المحمول
                                </label>
                                <input type="text" class="form-control rounded-pill px-4 py-3" id="phone" required style="font-size: 1.1rem; border: 1.5px solid rgba(201,153,151,0.2);">
                            </div>

                            <!-- Location/Address Input -->
                            <div class="mb-4">
                                <label class="form-label text-espresso fw-bold" style="font-size: 1.05rem;">
                                    <i class="bi bi-geo-alt-fill text-marigold me-1"></i>عنوان التوصيل بالتفصيل في قريتنا
                                </label>
                                <input type="text" class="form-control rounded-pill px-4 py-3" id="location" placeholder="مثال: بحري البلد، بجوار المسجد الكبير، بيت أبو أحمد" style="font-size: 1.1rem; border: 1.5px solid rgba(201,153,151,0.2);">
                            </div>

                            <!-- Coordinates (Lat / Lon) Row -->
                            <div class="row">
                                <div class="col-6 mb-4">
                                    <label class="form-label text-espresso fw-bold small">
                                        <i class="bi bi-compass text-marigold me-1"></i>خط العرض (Latitude)
                                    </label>
                                    <input type="number" step="0.000001" class="form-control rounded-pill px-3 py-2" id="latitude" style="border: 1.5px solid rgba(201,153,151,0.15);">
                                </div>
                                <div class="col-6 mb-4">
                                    <label class="form-label text-espresso fw-bold small">
                                        <i class="bi bi-compass-fill text-marigold me-1"></i>خط الطول (Longitude)
                                    </label>
                                    <input type="number" step="0.000001" class="form-control rounded-pill px-3 py-2" id="longitude" style="border: 1.5px solid rgba(201,153,151,0.15);">
                                </div>
                            </div>

                            <!-- Account Role -->
                            <div class="mb-4">
                                <label class="form-label text-espresso fw-bold" style="font-size: 1.05rem;">
                                    <i class="bi bi-person-badge-fill text-marigold me-1"></i>نوع الحساب
                                </label>
                                <input type="text" class="form-control rounded-pill px-4 py-3 text-muted bg-light" id="role" disabled style="font-size: 1.1rem; border: 1.5px solid rgba(201,153,151,0.15);">
                            </div>

                            <!-- Save Button & Status Message -->
                            <button type="submit" class="btn btn-primary rounded-pill w-100 py-3 fw-bold mb-2" id="saveBtn" style="font-size: 1.15rem;">
                                <i class="bi bi-check2-circle me-1"></i>حفظ تعديلات حسابي
                            </button>
                            <div id="statusMsg" class="text-center fw-bold d-none mt-2" style="font-size: 1rem;"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
