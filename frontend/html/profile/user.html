<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../css/main_style.css">
    <link rel="stylesheet" href="../../css/profile.css">
</head>
<body class="bg-dune">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-espresso fs-3" href="../index.html">بركة</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="../index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="../shops/list.html">المحلات</a></li>
                </ul>
                <div class="d-flex auth-buttons" id="authSection"></div>
            </div>
        </div>
    </nav>

    <!-- Profile Section -->
    <section class="py-5 mt-5">
        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shop-card border-0 p-4 animate-up">
                        <h3 class="fw-bold text-espresso mb-4 text-center border-bottom border-terracotta pb-3">الملف الشخصي</h3>
                        
                        <form id="profileForm" enctype="multipart/form-data">
                            <div class="text-center mb-4">
                                <div class="d-inline-block position-relative">
                                    <div id="profileImagePreview" class="rounded-circle d-flex align-items-center justify-content-center shadow" style="width: 120px; height: 120px; overflow: hidden; background-color: var(--color-terracotta);">
                                        <span class="text-white fs-1" id="profileInitials">?</span>
                                    </div>
                                    <label for="image" class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 start-0" style="width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-camera-fill" viewBox="0 0 16 16">
                                          <path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
                                          <path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1m9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0"/>
                                        </svg>
                                    </label>
                                    <input type="file" id="image" accept="image/*" class="d-none">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-espresso fw-bold">الاسم</label>
                                    <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-espresso fw-bold">رقم الهاتف</label>
                                    <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="phone" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-espresso fw-bold">العنوان (المكان)</label>
                                <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="location">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-espresso fw-bold">نوع الحساب</label>
                                <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2 text-muted" id="role" disabled>
                            </div>
                            
                            <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 fw-bold mb-3" id="saveBtn">حفظ التعديلات</button>
                            <div id="statusMsg" class="text-center fw-bold d-none"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Custom JS -->
    <script src="../../js/api.js"></script>
    <script src="../../js/main.js"></script>
    <script src="../../js/profile.js"></script>
</body>
</html>
