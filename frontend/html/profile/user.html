<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/profile.css">
</head>
<body class="bg-dune">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Profile Section -->
    <section class="profile-header">
        <div class="container">
            <div class="text-center animate-up">
                <h3 class="fw-bold text-espresso"><i class="bi bi-person-circle me-2"></i>الملف الشخصي</h3>
            </div>
        </div>
    </section>

    <section class="py-4">
        <div class="container">
            <div class="row g-4 justify-content-center">
                <!-- Profile Edit Card (Right) -->
                <div class="col-lg-5 col-md-6 order-lg-2">
                    <div class="dashboard-card animate-up mb-4">
                        <h4 class="fw-bold text-espresso mb-4 pb-2 border-bottom"><i class="bi bi-person-gear me-2 text-marigold"></i>تعديل بيانات الحساب</h4>
                        <form id="profileForm" enctype="multipart/form-data">
                            <!-- Avatar -->
                            <div class="text-center mb-4">
                                <div class="d-inline-block position-relative">
                                    <div id="profileImagePreview" class="profile-avatar mx-auto">
                                        <span class="text-white fs-1" id="profileInitials">?</span>
                                    </div>
                                    <label for="image" class="upload-btn position-absolute bottom-0 start-0">
                                        <i class="bi bi-camera-fill" style="font-size: 0.85rem;"></i>
                                    </label>
                                    <input type="file" id="image" accept="image/*" class="d-none">
                                </div>
                            </div>

                            <!-- Fields -->
                            <div class="mb-3">
                                <label class="form-label text-espresso fw-bold"><i class="bi bi-person me-1"></i>الاسم</label>
                                <input type="text" class="form-control rounded-pill px-4 py-2" id="name" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-espresso fw-bold"><i class="bi bi-phone me-1"></i>رقم الهاتف</label>
                                <input type="text" class="form-control rounded-pill px-4 py-2" id="phone" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-espresso fw-bold"><i class="bi bi-geo-alt me-1"></i>العنوان (المكان)</label>
                                <input type="text" class="form-control rounded-pill px-4 py-2" id="location">
                            </div>
                            <div class="row">
                                <div class="col-6 mb-3">
                                    <label class="form-label text-espresso fw-bold small"><i class="bi bi-compass me-1"></i>خط العرض</label>
                                    <input type="number" step="0.000001" class="form-control rounded-pill px-3 py-2" id="latitude">
                                </div>
                                <div class="col-6 mb-3">
                                    <label class="form-label text-espresso fw-bold small"><i class="bi bi-compass-fill me-1"></i>خط الطول</label>
                                    <input type="number" step="0.000001" class="form-control rounded-pill px-3 py-2" id="longitude">
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-espresso fw-bold"><i class="bi bi-person-badge me-1"></i>نوع الحساب</label>
                                <input type="text" class="form-control rounded-pill px-4 py-2 text-muted" id="role" disabled>
                            </div>
                            
                            <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 fw-bold mb-2" id="saveBtn">
                                <i class="bi bi-check2-circle me-1"></i>حفظ التعديلات
                            </button>
                            <div id="statusMsg" class="text-center fw-bold d-none"></div>
                        </form>
                    </div>
                </div>

                <!-- Recent Orders Tracker Card (Left) -->
                <div class="col-lg-7 col-md-6 order-lg-1" id="customerOrdersContainer" style="display: none;">
                    <div class="dashboard-card animate-up">
                        <div class="d-flex justify-content-between align-items-center mb-4 pb-2 border-bottom">
                            <h4 class="fw-bold text-espresso mb-0"><i class="bi bi-bag-check me-2 text-marigold"></i>طلباتي الأخيرة</h4>
                            <span class="badge bg-espresso text-white rounded-pill px-3 py-1" id="ordersCountBadge">0 طلب</span>
                        </div>
                        <div id="customerOrdersList" style="max-height: 550px; overflow-y: auto; padding-right: 5px;">
                            <!-- Dynamic customer orders will be populated here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/profile.js"></script>
</body>
</html>
