<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المطعم - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/restaurants.css">
</head>
<body class="bg-dune">

    <div id="header-placeholder"></div>

    <section class="py-5">
        <div class="container">
            <div class="row g-4">
                <div class="col-12" id="restaurantDetailContent">
                    <div class="text-center py-5" style="color: var(--color-mesa);">
                        <div class="spinner-border mb-3" style="color: var(--restaurant-primary); width: 2.5rem; height: 2.5rem;" role="status"></div>
                        <p class="fw-bold">بنحمل بيانات المطعم...</p>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <button class="rest-floating-cart-btn" id="restFloatingCartBtn" onclick="openRestCartModal()">
        <i class="bi bi-bag-check fs-5"></i>
        <span>عرض الطلب</span>
        <span class="cart-badge" id="restCartCountBadge">0</span>
    </button>

    <div class="modal fade" id="restCartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 rounded-4 rest-modal-content">
                <div class="modal-header border-0">
                    <h5 class="fw-bold text-espresso"><i class="bi bi-bag-check me-2 text-marigold"></i>طلبي من المطعم</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="restCartModalBody"></div>
                <div class="modal-footer border-0" id="restCartModalFooter"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/restaurants.js"></script>
</body>
</html>
