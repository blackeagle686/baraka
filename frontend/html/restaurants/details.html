<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المطعم - BARAKA</title>
    <link rel="icon" href="/images/baraka_logo_low_nobg.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="/css/main.css">
    <link rel="stylesheet" href="/css/restaurants.css">
    <style>
        .restaurant-detail-header { background: linear-gradient(135deg, var(--restaurant-primary, #f97316), var(--restaurant-dark, #c2410c)); color: white; border-radius: 24px; padding: 2rem; position: relative; overflow: hidden; margin-bottom: 1.5rem; }
        .restaurant-detail-header::before { content: '\U0001f37d\ufe0f'; position: absolute; top: -30px; left: -30px; font-size: 12rem; opacity: 0.08; }
        .restaurant-detail-img { width: 90px; height: 90px; border-radius: 20px; object-fit: cover; border: 3px solid rgba(255,255,255,0.3); }
        .floating-cart-btn { position: fixed; bottom: 20px; left: 20px; z-index: 1000; border-radius: 100px; padding: 0.7rem 1.5rem; background: var(--color-espresso); color: white; border: none; font-weight: 700; box-shadow: 0 4px 20px rgba(0,0,0,0.2); display: none; align-items: center; gap: 0.5rem; }
        .floating-cart-btn .cart-badge { background: var(--restaurant-primary); color: white; border-radius: 50%; width: 24px; height: 24px; display: flex; align-items: center; justify-content: center; font-size: 0.75rem; font-weight: 700; }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <div class="container py-3">
        <div id="restaurantDetailContent"></div>
    </div>
    <button class="floating-cart-btn" id="restFloatingCartBtn" onclick="openRestCartModal()">
        <i class="bi bi-bag-check fs-5"></i>
        <span>عرض الطلب</span>
        <span class="cart-badge" id="restCartCountBadge">0</span>
    </button>
    <div class="modal fade" id="restCartModal" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 rounded-4" style="background: var(--color-dune-light);">
                <div class="modal-header border-0">
                    <h5 class="fw-bold text-espresso"><i class="bi bi-bag-check me-2 text-marigold"></i>طلبي من المطعم</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4" id="restCartModalBody"></div>
                <div class="modal-footer border-0" id="restCartModalFooter"></div>
            </div>
        </div>
    </div>
    <div id="footer-placeholder"></div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/restaurants.js"></script>
</body>
</html>
