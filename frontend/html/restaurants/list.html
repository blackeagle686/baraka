<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مطاعم القرية - منصة بركة</title>
    <meta name="description" content="تصفح مطاعم بركة القريبة منك، ابحث عن فطار، غدا، عشاء، مشاوي وغيرها من مطاعم قريتك.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/restaurants.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="bg-dune rest-overflow-hidden">

    <div id="header-placeholder"></div>

    <div class="rest-split-container">

        <!-- Sidebar -->
        <aside class="rest-sidebar" id="restSidebarPanel">

            <div class="rest-sidebar-top-panel">

                <div class="rest-sidebar-brand-row">
                    <div>
                        <div class="rest-sidebar-brand-title">
                            <i class="bi bi-shop-window text-marigold me-1" style="font-size: 1.1rem;"></i>
                            مطاعم قريتك
                        </div>
                        <div class="rest-sidebar-brand-subtitle">اطلب من أقرب مطعم وبأسرع وقت</div>
                    </div>
                    <span class="rest-count-pill">
                        <i class="bi bi-pin-map-fill me-1"></i>
                        <span id="restaurantsCountNum">...</span> مطعم
                    </span>
                </div>

                <div class="rest-search-wrap">
                    <i class="bi bi-search rest-search-icon"></i>
                    <input type="text" id="restSearchInput"
                           class="rest-search-input"
                           placeholder="ابحث عن مطعم، مشاوي، فطار...">
                    <button class="rest-search-clear" id="restSearchClear" title="مسح البحث">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>

                <div class="rest-open-now-row">
                    <label for="restOpenNowFilter" class="rest-open-now-label" style="cursor: pointer;">
                        <span class="pulse-dot"></span>
                        مفتوح دلوقتي فقط
                    </label>
                    <div class="form-check form-switch p-0 m-0">
                        <input class="form-check-input m-0" type="checkbox" role="switch" id="restOpenNowFilter">
                    </div>
                </div>

                <div class="rest-category-pills" id="restCategoryPills">
                    <span class="badge rounded-pill px-3 py-2 rest-category-pill active" data-search="">الكل</span>
                    <span class="badge rounded-pill px-3 py-2 rest-category-pill" data-search="فطار">فطار</span>
                    <span class="badge rounded-pill px-3 py-2 rest-category-pill" data-search="غدا">غدا</span>
                    <span class="badge rounded-pill px-3 py-2 rest-category-pill" data-search="عشاء">عشاء</span>
                    <span class="badge rounded-pill px-3 py-2 rest-category-pill" data-search="مشاوي">مشاوي</span>
                    <span class="badge rounded-pill px-3 py-2 rest-category-pill" data-search="مأكولات بحرية">بحري</span>
                    <span class="badge rounded-pill px-3 py-2 rest-category-pill" data-search="حلويات">حلويات</span>
                </div>

            </div>

            <div class="rest-list-scroll" id="restaurantsListContainer">
                <div class="text-center py-5" style="color: var(--color-mesa);">
                    <div class="spinner-border mb-3" style="color: var(--restaurant-primary); width: 2rem; height: 2rem;" role="status"></div>
                    <p class="fw-bold mb-0" style="font-size: 0.9rem;">بنحمل المطاعم عشانك...</p>
                </div>
            </div>

            <div class="rest-pagination-bar d-flex justify-content-center align-items-center gap-2" id="restaurantsPagination"></div>

        </aside>

        <!-- Map -->
        <main class="rest-map-wrapper" id="restMapWrapper">

            <div class="rest-map-top-bar">
                <div class="rest-map-top-badge">
                    <span class="dot"></span>
                    <span id="restActiveMapCount">جاري تحديد المطاعم...</span>
                </div>
            </div>

            <div id="restMap" style="width: 100%; height: 100%;"></div>

        </main>

    </div>

    <button id="restListToggleView" class="btn btn-primary rounded-pill shadow-lg px-4 py-2 fw-bold position-fixed bottom-0 start-50 translate-middle-x mb-4" style="z-index: 9999 !important;">
        <i class="bi bi-map me-1"></i> عرض الخريطة 🗺️
    </button>

    <div id="footer-placeholder"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/restaurant_list.js"></script>
    <script src="/js/restaurants.js"></script>
</body>
</html>
