<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المحل - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/shops.css">
</head>
<body class="bg-dune">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Shop Cover Banner -->
    <div id="shopCoverBanner">
        <div class="shop-cover-banner" style="background-image: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1542838132-92c53300491e?q=80&w=1200');">
            <div class="container pb-4 w-100">
                <nav aria-label="breadcrumb">
                    <ol class="breadcrumb m-0 mb-3">
                        <li class="breadcrumb-item"><a href="/html/shops/list.html" class="text-white text-decoration-none fw-bold"><i class="bi bi-arrow-right-short"></i> الرجوع للمحلات</a></li>
                    </ol>
                </nav>
                <div id="shopHeader">
                    <h1 class="shop-cover-title text-white fw-bold mb-2">جاري التحميل...</h1>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Content Section (Two Columns) -->
    <section class="py-5">
        <div class="container">
            <div class="row g-4">
                <!-- Left Column (Products) -->
                <div class="col-lg-8 col-md-7">
                    <!-- Search & Categories (Partitions) Section -->
                    <div class="shop-search-filter-section mb-4 p-4 rounded-4 animate-up">
                        <!-- Search Bar -->
                        <div class="shop-search-wrapper mb-3">
                            <span class="shop-search-icon"><i class="bi bi-search text-marigold"></i></span>
                            <input type="text" id="productSearchInput" class="form-control shop-search-input py-3 pe-5 ps-4 rounded-pill" placeholder="ابحث عن منتج بالاسم أو القسم (مثال: خضروات، ألبان)..." autocomplete="off">
                            <button type="button" id="clearProductSearch" class="btn shop-search-clear-btn d-none"><i class="bi bi-x-lg"></i></button>
                        </div>
                        
                        <!-- Categories / Partitions -->
                        <div class="shop-categories-container mt-2">
                            <h6 class="fw-bold text-espresso mb-3 small d-flex align-items-center gap-2">
                                <i class="bi bi-tags-fill text-marigold"></i>
                                <span>أقسام المحل:</span>
                            </h6>
                            <div class="shop-categories-tabs" id="shopCategoriesTabs">
                                <!-- Tabs dynamically populated by JS -->
                                <div class="shop-category-tab active" onclick="selectProductCategory('all')">
                                    <span class="tab-icon"><i class="bi bi-grid-fill"></i></span>
                                    <span>الكل</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h3 class="fw-bold text-espresso m-0">
                            <i class="bi bi-box-seam me-2 text-marigold"></i><span id="productsSectionTitle">المنتجات الأكثر طلبًا 🔥</span>
                        </h3>
                        <span id="productsCountBadge" class="badge bg-mesa-soft text-mesa rounded-pill px-3 py-2 fw-bold d-none">0 منتج</span>
                    </div>

                    <div class="row g-4" id="productsList">
                        <div class="text-center text-mesa py-5">
                            <div class="spinner-border text-marigold mb-3" role="status"></div>
                            <p class="fw-bold">بنحضرلك المنتجات الطازة...</p>
                        </div>
                    </div>
                </div>
                
                <!-- Right Column (Checkout Card) -->
                <div class="col-lg-4 col-md-5">
                    <div class="checkout-sidebar-card animate-up" id="checkoutSidebar">
                        <!-- Loaded dynamically via updateCartUI() -->
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Floating Cart Button -->
    <div id="floatingCartBtn" class="floating-cart-btn d-none animate-up" onclick="openCartModal()">
        <i class="bi bi-cart3"></i>
        <span class="cart-badge" id="cartCountBadge">0</span>
    </div>

    <!-- Cart Modal -->
    <div class="modal fade" id="cartModal" tabindex="-1" aria-labelledby="cartModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content border-0 rounded-4 shadow-lg" style="background-color: var(--color-dune-light);">
                <div class="modal-header border-0 pb-0">
                    <h5 class="modal-title fw-bold text-espresso" id="cartModalLabel">
                        <i class="bi bi-cart3 me-2 text-marigold"></i>سلة المشتريات
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div id="cartItemsList" class="mb-4">
                        <!-- Cart items will be loaded here -->
                    </div>
                    
                    <div class="mb-3">
                        <label class="form-label text-espresso fw-bold"><i class="bi bi-geo-alt me-1"></i>عنوان التوصيل</label>
                        <input type="text" class="form-control rounded-pill px-4 py-2" id="orderAddress" placeholder="ادخل عنوانك بالتفصيل...">
                    </div>
                    
                    <div class="d-flex justify-content-between align-items-center mb-4 fw-bold text-espresso fs-5 border-top pt-3">
                        <span>الإجمالي:</span>
                        <span id="cartTotalPrice" class="text-marigold">0 ج.م</span>
                    </div>
                    
                    <button onclick="submitOrder()" class="btn btn-primary w-100 rounded-pill py-2 fw-bold" id="submitOrderBtn">
                        <i class="bi bi-check-all me-1"></i>إرسال الطلب للمحل
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/shops.js"></script>
</body>
</html>
