<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحلات - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/shops.css">
    <!-- Leaflet.js CSS for Map Integration -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="bg-dune">
    <!-- Header Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Main Split Layout Container -->
    <div class="shops-split-container">
        <!-- Sidebar on Left -->
        <aside class="shops-sidebar animate-up">
            <div class="sidebar-header p-4 pb-0">
                <h3 class="fw-bold text-espresso mb-1">المحلات اللي حواليك</h3>
                <p class="text-mesa mb-3 small">لف في محلات قرية بركة واشتري كل اللي ناقصك</p>
                
                <!-- Search & Filters -->
                <div class="search-filter-section mb-3">
                    <div class="position-relative mb-3">
                        <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-mesa"></i>
                        <input type="text" id="shopSearchInput" class="form-control rounded-pill py-2 ps-5 pe-3" placeholder="دور على محل أو سوبرماركت...">
                    </div>
                    <div class="d-flex justify-content-between align-items-center bg-white p-2 px-3 rounded-pill border shadow-sm" style="border-color: rgba(201,153,151,0.15) !important;">
                        <span class="fw-bold text-espresso small"><i class="bi bi-clock-history text-marigold me-1"></i>مفتوح دلوقتي بس</span>
                        <div class="form-check form-switch p-0 m-0">
                            <input class="form-check-input m-0" type="checkbox" role="switch" id="openNowFilter" style="width: 2.5rem; height: 1.25rem; cursor: pointer;">
                        </div>
                    </div>
                </div>
            </div>

            <!-- Shops List Container -->
            <div class="shops-list-scroll p-4 pt-2 animate-up" id="allShopsList">
                <div class="text-center text-mesa py-5">
                    <div class="spinner-border text-marigold mb-3" role="status"></div>
                    <p class="fw-bold">بنحمل المحلات عشانك...</p>
                </div>
            </div>
        </aside>

        <!-- Map View on Right -->
        <main class="shops-map-wrapper">
            <div class="map-status-overlay">
                <span class="badge rounded-pill px-3 py-2 shadow-sm" id="activeShopsMapCount">بيحدد المحلات...</span>
            </div>
            <div id="shopsDirectoryMap" style="width: 100%; height: 100%;"></div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Leaflet JS Library -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/shops.js"></script>
</body>
</html>
