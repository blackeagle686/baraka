<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحلات - منصة بركة</title>
    <meta name="description" content="تصفح محلات بركة القريبة منك، ابحث عن البقالة، الخضار، الصيدلية وغيرها من محلات القرية.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/shops.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <style>
        /* ====================================
           Modern List Page Enhancements
           ==================================== */

        .shops-sidebar {
            width: 420px;
            display: flex;
            flex-direction: column;
            background: var(--color-dune-light, #fdf5f1);
            border-left: 1px solid rgba(201, 153, 151, 0.13);
            box-shadow: -2px 0 20px rgba(50, 4, 4, 0.04);
        }

        /* --- Sidebar Top Panel --- */
        .sidebar-top-panel {
            padding: 1.5rem 1.5rem 0;
            background: linear-gradient(160deg, rgba(255,255,255,0.95) 0%, rgba(253,245,241,0.9) 100%);
            border-bottom: 1px solid rgba(201, 153, 151, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        .sidebar-brand-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 1.1rem;
        }

        .sidebar-brand-title {
            font-size: 1.3rem;
            font-weight: 800;
            color: var(--color-espresso, #320404);
            letter-spacing: -0.3px;
            line-height: 1.2;
        }

        .sidebar-brand-subtitle {
            font-size: 0.78rem;
            color: var(--color-mesa, #c99997);
            font-weight: 600;
            margin-top: 2px;
        }

        .shops-count-pill {
            background: linear-gradient(135deg, var(--color-marigold, #c29240), #e0b060);
            color: white;
            font-size: 0.75rem;
            font-weight: 800;
            padding: 0.3rem 0.75rem;
            border-radius: 100px;
            white-space: nowrap;
            box-shadow: 0 3px 10px rgba(194,146,64,0.3);
        }

        /* --- Search Input --- */
        .shops-search-wrap {
            position: relative;
            margin-bottom: 0.9rem;
        }

        .shops-search-wrap .search-icon {
            position: absolute;
            top: 50%;
            right: 1rem;
            transform: translateY(-50%);
            color: var(--color-mesa, #c99997);
            font-size: 1rem;
            pointer-events: none;
            z-index: 2;
        }

        .shops-search-input {
            width: 100%;
            border: 1.5px solid rgba(201, 153, 151, 0.2);
            border-radius: 14px;
            padding: 0.7rem 2.8rem 0.7rem 3rem;
            font-family: 'Cairo', sans-serif;
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--color-espresso, #320404);
            background: white;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .shops-search-input::placeholder {
            color: rgba(201, 153, 151, 0.7);
            font-weight: 500;
        }

        .shops-search-input:focus {
            border-color: rgba(194, 146, 64, 0.5);
            box-shadow: 0 0 0 3px rgba(194, 146, 64, 0.1);
        }

        .shops-search-clear {
            position: absolute;
            top: 50%;
            left: 0.75rem;
            transform: translateY(-50%);
            background: none;
            border: none;
            color: var(--color-mesa);
            cursor: pointer;
            font-size: 0.85rem;
            display: none;
            padding: 0;
            line-height: 1;
        }

        /* --- Open Now Toggle Row --- */
        .open-now-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            border: 1.5px solid rgba(201, 153, 151, 0.15);
            border-radius: 12px;
            padding: 0.55rem 1rem;
            margin-bottom: 1rem;
        }

        .open-now-label {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--color-espresso);
            display: flex;
            align-items: center;
            gap: 0.4rem;
        }

        .open-now-label .pulse-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            display: inline-block;
            animation: pulse-green 1.5s infinite;
        }

        @keyframes pulse-green {
            0%, 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); }
            50% { box-shadow: 0 0 0 5px rgba(34, 197, 94, 0); }
        }

        /* --- Category Filter Pills --- */
        .category-pills {
            display: flex;
            gap: 0.5rem;
            padding-bottom: 1.1rem;
            overflow-x: auto;
            scrollbar-width: none;
            -ms-overflow-style: none;
        }
        .category-pills::-webkit-scrollbar { display: none; }

        .cat-pill {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            padding: 0.35rem 0.85rem;
            border-radius: 100px;
            border: 1.5px solid rgba(201, 153, 151, 0.2);
            background: white;
            color: var(--color-espresso);
            font-size: 0.8rem;
            font-weight: 700;
            font-family: 'Cairo', sans-serif;
            white-space: nowrap;
            cursor: pointer;
            transition: all 0.2s ease;
            flex-shrink: 0;
        }

        .cat-pill:hover {
            border-color: rgba(194, 146, 64, 0.4);
            background: rgba(194, 146, 64, 0.05);
            color: var(--color-marigold);
        }

        .cat-pill.active {
            background: linear-gradient(135deg, var(--color-marigold), #e0b060);
            border-color: transparent;
            color: white;
            box-shadow: 0 3px 10px rgba(194,146,64,0.25);
        }

        /* --- Shops List Scroll Area --- */
        .shops-list-scroll {
            flex-grow: 1;
            overflow-y: auto;
            padding: 1.25rem 1.25rem 2rem;
            min-height: 0;
        }

        /* --- Section Label inside list --- */
        .list-section-label {
            font-size: 0.72rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--color-mesa);
            margin-bottom: 0.85rem;
            padding-bottom: 0.4rem;
            border-bottom: 1px dashed rgba(201, 153, 151, 0.2);
        }

        /* --- Pagination Area --- */
        .shops-pagination-bar {
            padding: 0.75rem 1.25rem;
            border-top: 1px solid rgba(201, 153, 151, 0.12);
            background: rgba(255,255,255,0.8);
            backdrop-filter: blur(8px);
        }

        /* --- Map Area Enhancements --- */
        .shops-map-wrapper {
            flex-grow: 1;
            position: relative;
            height: 100%;
        }

        .map-top-bar {
            position: absolute;
            top: 16px;
            left: 0;
            right: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }

        .map-top-badge {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(201, 153, 151, 0.2);
            border-radius: 100px;
            padding: 0.45rem 1.2rem;
            font-size: 0.82rem;
            font-weight: 800;
            font-family: 'Cairo', sans-serif;
            color: var(--color-espresso);
            box-shadow: 0 6px 20px rgba(50, 4, 4, 0.1);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .map-top-badge .dot {
            width: 7px;
            height: 7px;
            background: var(--color-marigold);
            border-radius: 50%;
            animation: pulse-gold 2s infinite;
        }

        @keyframes pulse-gold {
            0%, 100% { box-shadow: 0 0 0 0 rgba(194,146,64,0.5); }
            50% { box-shadow: 0 0 0 6px rgba(194,146,64,0); }
        }

        /* --- Responsive --- */
        @media (max-width: 768px) {
            .shops-split-container {
                flex-direction: column;
            }
            .shops-sidebar {
                width: 100%;
                max-height: 55vh;
            }
            .shops-map-wrapper {
                min-height: 45vh;
            }
        }
    </style>
</head>
<body class="bg-dune overflow-hidden">

    <!-- Navbar -->
    <div id="header-placeholder"></div>

    <!-- Full-Height Split Layout -->
    <div class="shops-split-container">

        <!-- ===================== SIDEBAR ===================== -->
        <aside class="shops-sidebar">

            <!-- Top Panel: Search, Filters, Categories -->
            <div class="sidebar-top-panel">

                <!-- Brand Row -->
                <div class="sidebar-brand-row">
                    <div>
                        <div class="sidebar-brand-title">
                            <i class="bi bi-shop-window text-marigold me-1" style="font-size: 1.1rem;"></i>
                            محلات قريتك
                        </div>
                        <div class="sidebar-brand-subtitle">اطلب من أقرب محل وبأسرع وقت</div>
                    </div>
                    <span class="shops-count-pill" id="shopsCountPill">
                        <i class="bi bi-pin-map-fill me-1"></i>
                        <span id="shopsCountNum">...</span> محل
                    </span>
                </div>

                <!-- Search Input -->
                <div class="shops-search-wrap">
                    <i class="bi bi-search search-icon"></i>
                    <input type="text" id="shopSearchInput"
                           class="shops-search-input"
                           placeholder="ابحث عن محل، بقالة، صيدلية...">
                    <button class="shops-search-clear" id="searchClearBtn" title="مسح البحث">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>

                <!-- Open Now Toggle -->
                <div class="open-now-row">
                    <label for="openNowFilter" class="open-now-label" style="cursor: pointer;">
                        <span class="pulse-dot"></span>
                        مفتوح دلوقتي فقط
                    </label>
                    <div class="form-check form-switch p-0 m-0">
                        <input class="form-check-input m-0" type="checkbox" role="switch"
                               id="openNowFilter"
                               style="width: 2.6rem; height: 1.3rem; cursor: pointer;">
                    </div>
                </div>

                <!-- Category Pill Filters -->
                <div class="category-pills" id="categoryPillsRow">
                    <button class="cat-pill active" data-cat="" onclick="filterByCategory(this, '')">
                        🏪 الكل
                    </button>
                    <button class="cat-pill" data-cat="بقالة" onclick="filterByCategory(this, 'بقالة')">
                        🛒 بقالة
                    </button>
                    <button class="cat-pill" data-cat="خضار" onclick="filterByCategory(this, 'خضار')">
                        🥬 خضار
                    </button>
                    <button class="cat-pill" data-cat="لحوم" onclick="filterByCategory(this, 'لحوم')">
                        🥩 لحوم
                    </button>
                    <button class="cat-pill" data-cat="مخبز" onclick="filterByCategory(this, 'مخبز')">
                        🍞 مخبز
                    </button>
                    <button class="cat-pill" data-cat="ألبان" onclick="filterByCategory(this, 'ألبان')">
                        🥛 ألبان
                    </button>
                    <button class="cat-pill" data-cat="صيدلية" onclick="filterByCategory(this, 'صيدلية')">
                        💊 صيدلية
                    </button>
                </div>

            </div><!-- /sidebar-top-panel -->

            <!-- Scrollable Shops List -->
            <div class="shops-list-scroll" id="allShopsList">
                <div class="text-center py-5" style="color: var(--color-mesa);">
                    <div class="spinner-border mb-3" style="color: var(--color-marigold); width: 2rem; height: 2rem;" role="status"></div>
                    <p class="fw-bold mb-0" style="font-size: 0.9rem;">بنحمل المحلات عشانك...</p>
                </div>
            </div>

            <!-- Pagination Bar -->
            <div class="shops-pagination-bar d-flex justify-content-center align-items-center gap-2" id="shopsPagination">
                <!-- Loaded dynamically -->
            </div>

        </aside><!-- /sidebar -->

        <!-- ===================== MAP ===================== -->
        <main class="shops-map-wrapper">

            <!-- Floating Badge Overlay -->
            <div class="map-top-bar">
                <div class="map-top-badge">
                    <span class="dot"></span>
                    <span id="activeShopsMapCount">جاري تحديد المحلات...</span>
                </div>
            </div>

            <!-- Leaflet Map -->
            <div id="shopsDirectoryMap" style="width: 100%; height: 100%;"></div>

        </main><!-- /map -->

    </div><!-- /shops-split-container -->

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/shops.js"></script>
    <script>
        // --- Search Clear Button Visibility ---
        const searchInput = document.getElementById('shopSearchInput');
        const clearBtn = document.getElementById('searchClearBtn');

        if (searchInput && clearBtn) {
            searchInput.addEventListener('input', () => {
                clearBtn.style.display = searchInput.value.length > 0 ? 'block' : 'none';
            });
            clearBtn.addEventListener('click', () => {
                searchInput.value = '';
                clearBtn.style.display = 'none';
                searchInput.dispatchEvent(new Event('input'));
                searchInput.focus();
            });
        }

        // --- Category Pill Filter Handler ---
        window.filterByCategory = function(btn, category) {
            document.querySelectorAll('.cat-pill').forEach(p => p.classList.remove('active'));
            btn.classList.add('active');

            if (searchInput) {
                if (category) {
                    searchInput.value = category;
                    searchInput.dispatchEvent(new Event('input'));
                    clearBtn.style.display = 'block';
                } else {
                    searchInput.value = '';
                    searchInput.dispatchEvent(new Event('input'));
                    clearBtn.style.display = 'none';
                }
            }
        };
    </script>
</body>
</html>
