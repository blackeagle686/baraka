<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحلات - منصة بركة</title>
    <meta name="description" content="تصفح محلات بركة القريبة منك، ابحث عن البقالة، الخضار، الصيدلية وغيرها من محلات القرية.">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/main_style.css">
    <link rel="stylesheet" href="/css/shops.css">
    <!-- Modern Shops Directory Specific Stylesheet -->
    <link rel="stylesheet" href="/css/shopl_list.css">
    <!-- Leaflet Map CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
</head>
<body class="bg-dune overflow-hidden">

    <!-- Navbar -->
    <div id="header-placeholder"></div>

    <!-- Full-Height Split Layout -->
    <div class="shops-split-container">

        <!-- ===================== SIDEBAR ===================== -->
        <aside class="shops-sidebar">

            <!-- Top Panel: Search, Filters, Categories -->
            <div class="sidebar-top-panel">

                <!-- Brand Row -->
                <div class="sidebar-brand-row">
                    <div>
                        <div class="sidebar-brand-title">
                            <i class="bi bi-shop-window text-marigold me-1" style="font-size: 1.1rem;"></i>
                            محلات قريتك
                        </div>
                        <div class="sidebar-brand-subtitle">اطلب من أقرب محل وبأسرع وقت</div>
                    </div>
                    <span class="shops-count-pill" id="shopsCountPill">
                        <i class="bi bi-pin-map-fill me-1"></i>
                        <span id="shopsCountNum">...</span> محل
                    </span>
                </div>

                <!-- Search Input -->
                <div class="shops-search-wrap">
                    <i class="bi bi-search search-icon"></i>
                    <input type="text" id="shopSearchInput"
                           class="shops-search-input"
                           placeholder="ابحث عن محل، بقالة، صيدلية...">
                    <button class="shops-search-clear" id="searchClearBtn" title="مسح البحث">
                        <i class="bi bi-x-lg"></i>
                    </button>
                </div>

                <!-- Open Now Toggle -->
                <div class="open-now-row">
                    <label for="openNowFilter" class="open-now-label" style="cursor: pointer;">
                        <span class="pulse-dot"></span>
                        مفتوح دلوقتي فقط
                    </label>
                    <div class="form-check form-switch p-0 m-0">
                        <input class="form-check-input m-0" type="checkbox" role="switch"
                               id="openNowFilter">
                    </div>
                </div>

                <!-- Category Pill Filters -->
                <div class="category-pills" id="categoryPillsRow">
                    <button class="cat-pill active" data-cat="" onclick="filterByCategory(this, '')">
                        🏪 الكل
                    </button>
                    <button class="cat-pill" data-cat="بقالة" onclick="filterByCategory(this, 'بقالة')">
                        🛒 بقالة
                    </button>
                    <button class="cat-pill" data-cat="خضار" onclick="filterByCategory(this, 'خضار')">
                        🥬 خضار
                    </button>
                    <button class="cat-pill" data-cat="لحوم" onclick="filterByCategory(this, 'لحوم')">
                        🥩 لحوم
                    </button>
                    <button class="cat-pill" data-cat="مخبز" onclick="filterByCategory(this, 'مخبز')">
                        🍞 مخبز
                    </button>
                    <button class="cat-pill" data-cat="ألبان" onclick="filterByCategory(this, 'ألبان')">
                        🥛 ألبان
                    </button>
                    <button class="cat-pill" data-cat="صيدلية" onclick="filterByCategory(this, 'صيدلية')">
                        💊 صيدلية
                    </button>
                </div>

            </div><!-- /sidebar-top-panel -->

            <!-- Scrollable Shops List -->
            <div class="shops-list-scroll" id="allShopsList">
                <div class="text-center py-5" style="color: var(--color-mesa);">
                    <div class="spinner-border mb-3" style="color: var(--color-marigold); width: 2rem; height: 2rem;" role="status"></div>
                    <p class="fw-bold mb-0" style="font-size: 0.9rem;">بنحمل المحلات عشانك...</p>
                </div>
            </div>

            <!-- Pagination Bar -->
            <div class="shops-pagination-bar d-flex justify-content-center align-items-center gap-2" id="shopsPagination">
                <!-- Loaded dynamically -->
            </div>

        </aside><!-- /sidebar -->

        <!-- ===================== MAP ===================== -->
        <main class="shops-map-wrapper">

            <!-- Floating Badge Overlay -->
            <div class="map-top-bar">
                <div class="map-top-badge">
                    <span class="dot"></span>
                    <span id="activeShopsMapCount">جاري تحديد المحلات...</span>
                </div>
            </div>

            <!-- Leaflet Map -->
            <div id="shopsDirectoryMap" style="width: 100%; height: 100%;"></div>

        </main><!-- /map -->

    </div><!-- /shops-split-container -->

    <!-- ===================== UNIVERSAL VIEW TOGGLE ===================== -->
    <button id="mobileViewToggle" class="btn btn-primary rounded-pill shadow-lg px-4 py-2 fw-bold position-fixed bottom-0 start-50 translate-middle-x mb-4" style="z-index: 9999 !important;">
        <i class="bi bi-map me-1"></i> عرض الخريطة 🗺️
    </button>

    <!-- Libraries & Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/main.js"></script>
    <script src="/js/shops.js"></script>
    <script src="/js/shop_list.js"></script>
</body>
</html>
