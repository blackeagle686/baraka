<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منصة بركة - Baraka SaaS</title>
    <!-- Bootstrap 5 RTL -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-espresso fs-3" href="index.html">بركة</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="index.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="shops.html">المحلات</a>
                    </li>
                </ul>
                <div class="d-flex auth-buttons" id="authSection">
                    <!-- Auth buttons will be populated by JS -->
                </div>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section class="hero-section d-flex align-items-center">
        <div class="container text-center">
            <h1 class="display-3 fw-bold text-espresso mb-4 animate-up">اطلب كل اللي تحتاجه، <br><span class="text-marigold">في أي وقت!</span></h1>
            <p class="lead text-mesa mb-5 animate-up delay-1">أسرع خدمة توصيل في قريتك. من المحل لباب بيتك.</p>
            <a href="shops.html" class="btn btn-primary btn-lg rounded-pill px-5 py-3 fw-bold animate-up delay-2 shadow-sm pulse-btn">تصفح المحلات</a>
        </div>
    </section>

    <!-- Shops Section (Preview) -->
    <section class="py-5 bg-dune" id="shopsPreview">
        <div class="container">
            <h2 class="text-center fw-bold text-espresso mb-5">أشهر المحلات</h2>
            <div class="row" id="shopsList">
                <!-- Shop cards will be populated by JS -->
            </div>
        </div>
    </section>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <!-- Custom JS -->
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchShops();
        });

        async function fetchShops() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/shops/');
                if (response.ok) {
                    const shops = await response.json();
                    renderShops(shops);
                } else {
                    console.error("Failed to fetch shops.");
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function renderShops(shops) {
            const container = document.getElementById('shopsList');
            container.innerHTML = '';
            // Only show up to 3 shops on the landing page
            shops.slice(0, 3).forEach(shop => {
                const shopHtml = `
                    <div class="col-md-4 mb-4">
                        <div class="card shop-card border-0 h-100">
                            <div class="card-img-top shop-img-placeholder d-flex align-items-center justify-content-center">
                                ${shop.image ? `<img src="${shop.image}" class="w-100 h-100 object-fit-cover">` : `<span class="text-white fs-1 fw-bold">${shop.name.charAt(0)}</span>`}
                            </div>
                            <div class="card-body text-center">
                                <h5 class="card-title fw-bold text-espresso">${shop.name}</h5>
                                <p class="card-text text-mesa">${shop.description || 'أفضل المنتجات وأسرع توصيل'}</p>
                                <a href="shop_details.html?id=${shop.id}" class="btn btn-outline-primary rounded-pill w-100 mt-2">تسوق الآن</a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += shopHtml;
            });

            if (shops.length === 0) {
                container.innerHTML = '<p class="text-center text-mesa">لا توجد محلات حالياً. كن أول من يفتح محله!</p>';
            }
        }
    </script>
</body>
</html>
