<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تسجيل الدخول - بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dune">
    <div class="container d-flex align-items-center justify-content-center min-vh-100">
        <div class="col-md-5">
            <div class="card shop-card border-0 p-4 animate-up">
                <div class="text-center mb-4">
                    <a href="index.html" class="text-decoration-none">
                        <h2 class="fw-bold text-espresso">بركة</h2>
                    </a>
                    <p class="text-mesa">سجل دخولك للمتابعة</p>
                </div>
                <form id="loginForm">
                    <div class="mb-3">
                        <label class="form-label text-espresso fw-bold">رقم الهاتف</label>
                        <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="phone" required>
                    </div>
                    <div class="mb-4">
                        <label class="form-label text-espresso fw-bold">كلمة المرور</label>
                        <input type="password" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="password" required>
                    </div>
                    <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 fw-bold mb-3">دخول</button>
                    <div id="errorMsg" class="text-danger text-center mb-2 d-none">بيانات الدخول غير صحيحة</div>
                    <div class="text-center">
                        <span class="text-mesa">ليس لديك حساب؟</span>
                        <a href="register.html" class="text-marigold text-decoration-none fw-bold">حساب جديد</a>
                    </div>
                </form>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const phone = document.getElementById('phone').value;
            const password = document.getElementById('password').value;

            try {
                const res = await fetch('http://127.0.0.1:8000/api/auth/login/', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phone, password })
                });

                if (res.ok) {
                    const data = await res.json();
                    localStorage.setItem('access_token', data.access);
                    localStorage.setItem('refresh_token', data.refresh);
                    window.location.href = 'index.html';
                } else {
                    document.getElementById('errorMsg').classList.remove('d-none');
                }
            } catch (error) {
                console.error("Login failed:", error);
            }
        });
    </script>
</body>
</html>
