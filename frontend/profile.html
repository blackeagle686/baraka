<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>حسابي - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dune">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-espresso fs-3" href="index.html">بركة</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="shops.html">المحلات</a></li>
                </ul>
                <div class="d-flex auth-buttons" id="authSection"></div>
            </div>
        </div>
    </nav>

    <!-- Profile Section -->
    <section class="py-5 mt-5">
        <div class="container mt-4">
            <div class="row justify-content-center">
                <div class="col-md-8">
                    <div class="card shop-card border-0 p-4 animate-up">
                        <h3 class="fw-bold text-espresso mb-4 text-center border-bottom border-terracotta pb-3">الملف الشخصي</h3>
                        
                        <form id="profileForm" enctype="multipart/form-data">
                            <div class="text-center mb-4">
                                <div class="d-inline-block position-relative">
                                    <div id="profileImagePreview" class="rounded-circle d-flex align-items-center justify-content-center shadow" style="width: 120px; height: 120px; overflow: hidden; background-color: var(--color-terracotta);">
                                        <span class="text-white fs-1" id="profileInitials">?</span>
                                    </div>
                                    <label for="image" class="btn btn-sm btn-primary rounded-circle position-absolute bottom-0 start-0" style="width: 35px; height: 35px; display: flex; align-items: center; justify-content: center; cursor: pointer;">
                                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-camera-fill" viewBox="0 0 16 16">
                                          <path d="M10.5 8.5a2.5 2.5 0 1 1-5 0 2.5 2.5 0 0 1 5 0"/>
                                          <path d="M2 4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V6a2 2 0 0 0-2-2h-1.172a2 2 0 0 1-1.414-.586l-.828-.828A2 2 0 0 0 9.172 2H6.828a2 2 0 0 0-1.414.586l-.828.828A2 2 0 0 1 3.172 4zm.5 2a.5.5 0 1 1 0-1 .5.5 0 0 1 0 1m9 2.5a3.5 3.5 0 1 1-7 0 3.5 3.5 0 0 1 7 0"/>
                                        </svg>
                                    </label>
                                    <input type="file" id="image" accept="image/*" class="d-none">
                                </div>
                            </div>

                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-espresso fw-bold">الاسم</label>
                                    <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="name" required>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label text-espresso fw-bold">رقم الهاتف</label>
                                    <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="phone" required>
                                </div>
                            </div>
                            <div class="mb-3">
                                <label class="form-label text-espresso fw-bold">العنوان (المكان)</label>
                                <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2" id="location">
                            </div>
                            <div class="mb-4">
                                <label class="form-label text-espresso fw-bold">نوع الحساب</label>
                                <input type="text" class="form-control rounded-pill bg-light border-0 px-4 py-2 text-muted" id="role" disabled>
                            </div>
                            
                            <button type="submit" class="btn btn-primary rounded-pill w-100 py-2 fw-bold mb-3" id="saveBtn">حفظ التعديلات</button>
                            <div id="statusMsg" class="text-center fw-bold d-none"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchProfile();
        });

        const imageInput = document.getElementById('image');
        let newImageFile = null;

        imageInput.addEventListener('change', (e) => {
            if (e.target.files && e.target.files[0]) {
                newImageFile = e.target.files[0];
                const reader = new FileReader();
                reader.onload = function(e) {
                    document.getElementById('profileImagePreview').innerHTML = `<img src="${e.target.result}" class="w-100 h-100 object-fit-cover">`;
                };
                reader.readAsDataURL(newImageFile);
            }
        });

        async function fetchProfile() {
            const token = localStorage.getItem('access_token');
            if (!token) {
                window.location.href = 'login.html';
                return;
            }

            try {
                const res = await fetch('http://127.0.0.1:8000/api/auth/profile/', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const data = await res.json();
                    document.getElementById('name').value = data.name || '';
                    document.getElementById('phone').value = data.phone || '';
                    document.getElementById('location').value = data.location || '';
                    
                    const roleMap = {
                        'CUSTOMER': 'مشتري',
                        'SHOP_OWNER': 'صاحب محل',
                        'DRIVER': 'طيار (مندوب توصيل)',
                        'ADMIN': 'مدير'
                    };
                    document.getElementById('role').value = roleMap[data.role] || data.role;

                    if (data.image) {
                        document.getElementById('profileImagePreview').innerHTML = `<img src="${data.image}" class="w-100 h-100 object-fit-cover">`;
                    } else if (data.name) {
                        document.getElementById('profileInitials').innerText = data.name.charAt(0);
                    } else {
                        document.getElementById('profileInitials').innerText = data.phone.charAt(0);
                    }
                } else if (res.status === 401) {
                    localStorage.removeItem('access_token');
                    window.location.href = 'login.html';
                }
            } catch (error) {
                console.error("Failed to fetch profile:", error);
            }
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const token = localStorage.getItem('access_token');
            const saveBtn = document.getElementById('saveBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            saveBtn.disabled = true;
            saveBtn.innerText = 'جاري الحفظ...';

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('phone', document.getElementById('phone').value);
            formData.append('location', document.getElementById('location').value);
            if (newImageFile) {
                formData.append('image', newImageFile);
            }

            try {
                const res = await fetch('http://127.0.0.1:8000/api/auth/profile/', {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}` },
                    body: formData
                });

                if (res.ok) {
                    statusMsg.className = 'text-success text-center fw-bold mt-2';
                    statusMsg.innerText = 'تم حفظ التعديلات بنجاح!';
                    statusMsg.classList.remove('d-none');
                } else {
                    const err = await res.json();
                    statusMsg.className = 'text-danger text-center fw-bold mt-2';
                    statusMsg.innerText = 'خطأ: ' + JSON.stringify(err);
                    statusMsg.classList.remove('d-none');
                }
            } catch (error) {
                console.error("Failed to update profile:", error);
            } finally {
                saveBtn.disabled = false;
                saveBtn.innerText = 'حفظ التعديلات';
                setTimeout(() => statusMsg.classList.add('d-none'), 5000);
            }
        });
    </script>
</body>
</html>
