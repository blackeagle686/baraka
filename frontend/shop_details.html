<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تفاصيل المحل - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dune">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-espresso fs-3" href="index.html">بركة</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">الرئيسية</a></li>
                    <li class="nav-item"><a class="nav-link" href="shops.html">المحلات</a></li>
                </ul>
                <div class="d-flex auth-buttons" id="authSection"></div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <section class="py-5 mt-5">
        <div class="container mt-4 animate-up" id="shopHeader">
            <div class="text-center text-mesa">جاري تحميل بيانات المحل...</div>
        </div>
    </section>

    <!-- Products Section -->
    <section class="py-4 mb-5">
        <div class="container">
            <h3 class="fw-bold text-espresso mb-4 border-bottom border-terracotta pb-2">المنتجات</h3>
            <div class="row" id="productsList">
                <div class="text-center text-mesa">جاري تحميل المنتجات...</div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const shopId = params.get('id');
            if(shopId) {
                fetchShopDetails(shopId);
                fetchShopProducts(shopId);
            } else {
                document.getElementById('shopHeader').innerHTML = '<h2 class="text-danger">محل غير معروف</h2>';
            }
        });

        async function fetchShopDetails(id) {
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/shops/${id}/`);
                if (response.ok) {
                    const shop = await response.json();
                    document.getElementById('shopHeader').innerHTML = `
                        <div class="d-flex align-items-center justify-content-center flex-column">
                            ${shop.image ? `<img src="${shop.image}" class="rounded-circle mb-3 shadow" style="width:120px;height:120px;object-fit:cover;">` : `<div class="rounded-circle mb-3 d-flex align-items-center justify-content-center bg-terracotta text-white fs-1 shadow" style="width:120px;height:120px;">${shop.name.charAt(0)}</div>`}
                            <h2 class="fw-bold text-espresso">${shop.name}</h2>
                            <p class="text-mesa mb-1">${shop.description || ''}</p>
                            <span class="badge ${shop.is_open ? 'bg-success' : 'bg-danger'} rounded-pill px-3 py-2 mt-2">${shop.is_open ? 'مفتوح الآن' : 'مغلق'}</span>
                        </div>
                    `;
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        async function fetchShopProducts(shopId) {
            try {
                const response = await fetch(`http://127.0.0.1:8000/api/products/?shop_id=${shopId}`);
                if (response.ok) {
                    const products = await response.json();
                    const container = document.getElementById('productsList');
                    container.innerHTML = '';
                    
                    if (products.length === 0) {
                        container.innerHTML = '<p class="text-mesa w-100">لا توجد منتجات متوفرة حالياً.</p>';
                        return;
                    }

                    products.forEach(product => {
                        const html = `
                            <div class="col-md-4 mb-4 animate-up">
                                <div class="card shop-card border-0 h-100">
                                    <div class="card-body">
                                        <div class="d-flex justify-content-between align-items-start mb-2">
                                            <h5 class="fw-bold text-espresso">${product.name}</h5>
                                            <span class="text-marigold fw-bold">${product.price} ج.م</span>
                                        </div>
                                        <p class="text-mesa small mb-3">${product.description || ''}</p>
                                        <button class="btn btn-primary btn-sm rounded-pill w-100" ${!product.available ? 'disabled' : ''}>
                                            ${product.available ? 'أضف للسلة' : 'غير متوفر'}
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                        container.innerHTML += html;
                    });
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }
    </script>
</body>
</html>
