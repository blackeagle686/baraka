<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المحلات - منصة بركة</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.rtl.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-dune">
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg glass-nav fixed-top">
        <div class="container">
            <a class="navbar-brand fw-bold text-espresso fs-3" href="index.html">بركة</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">الرئيسية</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="shops.html">المحلات</a>
                    </li>
                </ul>
                <div class="d-flex auth-buttons" id="authSection">
                </div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <section class="py-5 mt-5 text-center">
        <div class="container mt-4 animate-up">
            <h2 class="fw-bold text-espresso mb-3">كل المحلات</h2>
            <p class="text-mesa">تصفح جميع المحلات في منطقتك واطلب كل اللي تحتاجه</p>
        </div>
    </section>

    <!-- Shops Section -->
    <section class="py-4 mb-5">
        <div class="container">
            <div class="row" id="allShopsList">
                <div class="text-center text-mesa">جاري تحميل المحلات...</div>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="main.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchAllShops();
        });

        async function fetchAllShops() {
            try {
                const response = await fetch('http://127.0.0.1:8000/api/shops/');
                if (response.ok) {
                    const shops = await response.json();
                    renderAllShops(shops);
                }
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function renderAllShops(shops) {
            const container = document.getElementById('allShopsList');
            container.innerHTML = '';
            
            if (shops.length === 0) {
                container.innerHTML = '<p class="text-center text-mesa w-100">لا توجد محلات حالياً.</p>';
                return;
            }

            shops.forEach(shop => {
                const shopHtml = `
                    <div class="col-md-3 mb-4 animate-up">
                        <div class="card shop-card border-0 h-100">
                            <div class="card-img-top shop-img-placeholder d-flex align-items-center justify-content-center" style="height: 150px;">
                                ${shop.image ? `<img src="${shop.image}" class="w-100 h-100 object-fit-cover">` : `<span class="text-white fs-2 fw-bold">${shop.name.charAt(0)}</span>`}
                            </div>
                            <div class="card-body text-center">
                                <h5 class="card-title fw-bold text-espresso">${shop.name}</h5>
                                <a href="shop_details.html?id=${shop.id}" class="btn btn-outline-primary rounded-pill w-100 mt-3 btn-sm">عرض المنتجات</a>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += shopHtml;
            });
        }
    </script>
</body>
</html>
